name: Keep Streamlit App Alive

on:
  schedule:
    - cron: "*/30 * * * *" # Runs every 30 minutes
  workflow_dispatch: # Allows manual triggering if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        # Streamlit apps often redirect to auth, which can cause exit code 47 (maximum redirects).
        # We append || true to ensure the workflow succeeds even if the redirect limit is reached,
        # because the initial ping is still enough to keep the app awake.
        run: curl -sL --max-redirs 5 https://growmoney.streamlit.app/_stcore/health > /dev/null || true
