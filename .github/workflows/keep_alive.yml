name: Keep Streamlit App Alive

on:
  schedule:
    - cron: "*/30 * * * *" # Runs every 30 minutes
  workflow_dispatch: # Allows manual triggering if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App with Headless Browser
        run: |
          npm init -y
          npm i puppeteer
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox', '--disable-setuid-sandbox'] });
            const page = await browser.newPage();
            try {
              console.log('Navigating to app...');
              await page.goto('https://growmoney.streamlit.app', { waitUntil: 'networkidle2', timeout: 30000 });
              console.log('Waiting 5 seconds for Streamlit to initialize...');
              await new Promise(r => setTimeout(r, 5000));
              console.log('Successfully pinged the app.');
            } catch(e) {
              console.error('Error connecting to app:', e);
            } finally {
              await browser.close();
            }
          })();
          "
